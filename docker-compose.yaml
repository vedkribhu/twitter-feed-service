services:
  postgres:
    image: postgres:16
    container_name: twitter-feed-postgres
    environment:
      POSTGRES_DB: twitter_feed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twitter_feed"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: twitter-feed-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
